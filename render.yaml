services:
  - type: web
    name: inkflow
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run bwa_frontend.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
